<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice</title>
<link rel="stylesheet" href="css/invoice.css">
</head>
<body>
    <main class="container">

        <h1 class="invoiceNum">INVOICE</h1>
        <div id="header-date"></div>

         <section class="senderInfo">
             <h1 id="sender"></h1> 
             <div id="senderEmail"></div> 
             <div id="senderPhoneNumber"></div> 
             <div id="senderBusinessName"></div> 
             <div id="senderAddress"></div> 
             <div id="senderCity"></div> 
             <div id="senderState"></div> 
             <div id="senderZip"></div> 
        </section>

            <section id="clientData">
                <strong>Attention:</strong>
                <div id="client"></div>
                <div id="clientPhoneNumber"></div>
                <div id="clientEmail"></div>
                <section>
                    <p>Address:</p>
                    <div id="clientBusinessName"></div>
                    <div id="clientAddress"></div>
                    <div id="clientCity"></div>
                    <div id="clientState"></div>
                    <div id="clientZip"></div>
                </section>
            </section>
            
            <div id="totals"></div>
            <section>

                <p>Description of Services:</p>
                <div id="description">
                </div>
                <div id="line-items"></div>
            </section>
        
        <footer>Thank you for your business. It's a pleasure to work with you on your projects. <br />
            Sincerely yours, <br/>
            <p id="sender"></p>
        </footer>
    </main>


<button><a class="no-print" href="index.html">Back To Form</a></button>

<script src="js/invoice.js"></script>
</body>
</html>
