<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Invoice</title>
<link rel="stylesheet" href="css/index.css">
</head>
<body>
<main class="container">
    <h1 class="header">Free Invoice Creator</h1>
    <h3>Create a custom invoice in seconds!</h3>
    <div class="background-img"></div>

    <form id="invoice-form">

<!-- --------------Sender Info -->
    <div class="senderContainer">
        <label for="contactInfo">Your Information</label>

        <input class="input" name="sender" placeholder="Name" autocomplete="name"/>
        <input class="input" name="senderPhoneNumber" placeholder="Phone Number" type="tel" />
        <input class="input" type="email" name="senderEmail" placeholder="Email" /> <br />

        <label for="address">Street Address</label>
        <input class="input" name="senderAddress" placeholder="Street Address" />
        <input class="input" name="senderCity" placeholder="City" />
        <input class="input" name="senderState" placeholder="State" />
        <input class="input" name="senderZip" placeholder="Zip Code" />

    </div>

    
    <div class="clientContainer">
        
        <!-- --------------Client Info -->
        <label for="contactInfo">Recipient Information</label>

        <input class="input" name="client" placeholder="Client Name" autocomplete="name" /> 
        <input class="input" name="clientPhoneNumber" placeholder="Phone Number" type="tel" />
        <input class="input" type="email" name="clientEmail" placeholder="Client Email"  />  <br/>

        <label for="address">Street Address</label>
        <input class="input" name="clientAddress" placeholder="Street Address" />
        <input class="input" name="clientCity" placeholder="City" />
        <input class="input" name="clientState" placeholder="State" />
        <input class="input" name="clientZip" placeholder="Zip Code" />        
    </div>
<!-- --------------The Money Part  -->
<div class="money">

    <input class="input" type="number" name="rate" placeholder="Hourly Rate"  /> <br/>
    <input class="input" type="hidden" name="taxExempt" value="false" />
    <label for="taxExempt">Tax Exempt</label> 
    <input type="checkbox" name="taxExempt" value="true" />
</div>

<!-- --------------The Work Part  -->
<div class="descriptionOfServices">
    <label for="services">Description of Services</label> <br/>

    <textarea class="servicesInput" name="description" placeholder="Description, comma separated" rows="10" cols="50"></textarea>
</div>

<!-- --------------The Time Part  -->
    <div class="calendar">
        <label for="Time In">Time In</label>
        <input class="input" type="datetime-local" name="timeIn"  />  <br/>
        <label for="Time Out">Time Out</label>

        <input class="input" type="datetime-local" name="timeOut"  /> <br/>
    </div>



 <!-- --------------The Submit Part  -->
       
        <button type="submit">Create Invoice</button>
    </form>

</main>

<script src="js/main.js"></script>
</body>
</html>
