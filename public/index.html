<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Invoice</title>
<link rel="stylesheet" href="css/invoice.css">
</head>
<body>
<main class="container">
    <h1 class="header">Instant Invoice Creator</h1>
    <h3>Create professional invoices in seconds!</h3>

    <form id="invoice-form">
<!-- --------------Sender Info -->
        <input name="sender" placeholder="Your Name" />
        <!-- <input type="senderEmail" placeholder="Your Email" /> -->
        <!-- <input name="senderAddress" placeholder="Your Address" /> -->

<!-- --------------Client Info -->

        <input name="client" placeholder="Client Name"  />  <br/>
        <!-- <input name="clientEmail" placeholder="Client Email"  />  <br/> -->
        <!-- <input name="clientAddress" placeholder="Client Address"  />  <br/> -->
        
<!-- --------------The Money Part  -->

        <input type="number" name="rate" placeholder="Hourly Rate"  />
        <input type="number" name="flatRate" placeholder="Flat Rate"  />
        <input type="hidden" name="taxExempt" value="false" />
        <input type="checkbox" name="taxExempt" value="true" />
<!-- <input type="number" name="nonBillable" /> -->
<!-- <input type="number" name="flatRate" placeholder="enter a dollar ammount" /> -->

<!-- --------------The Work Part  -->

        <input name="description" placeholder="Description, comma separated"  />  <br/>

<!-- --------------The Time Part  -->

<button id="description">Time In</button>  OR  <input type="datetime-local" name="timeIn"  />  <br/>
<button id="time-out">Time Out</button>  OR  <input type="datetime-local" name="timeOut"  /> <br/>



 <!-- --------------The Submit Part  -->
       
        <button type="submit">Create Invoice</button>
        <button type="submit">Find Invoice by Date (make function to find between cetrain dates)</button>
    </form>

</main>

<script src="js/main.js"></script>
</body>
</html>
