<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Invoice</title>
<link rel="stylesheet" href="css/index.css">
</head>
<body>
<main class="container">
    <h1 class="header">Instant Invoice Creator</h1>
    <h3>Create professional invoices in seconds!</h3>
    <div class="background-img"></div>

    <form id="invoice-form">
<!-- --------------Sender Info -->
    <div class="aside">
        <input name="sender" placeholder="Your Name" />
        <input name="phoneNumber" placeholder="Your Phone Number" />
        <input type="email" name="senderEmail" placeholder="Your Email" />
        <input name="senderAddress" placeholder="Your Address" />
    </div>

<!-- --------------Client Info -->

        <input name="client" placeholder="Client Name"  />  <br/>
        <input type="email" name="clientEmail" placeholder="Client Email"  />  <br/>
        <input name="clientAddress" placeholder="Client Address"  />  <br/>
        
<!-- --------------The Money Part  -->

        <input type="number" name="rate" placeholder="Hourly Rate"  />
        <input type="hidden" name="taxExempt" value="false" />
        <input type="checkbox" name="taxExempt" value="true" />
        <!-- <input type="number" name="nonBillable" /> -->

<!-- --------------The Work Part  -->

        <input name="description" placeholder="Description, comma separated"  />  <br/>

<!-- --------------The Time Part  -->

<!-- <button id="currentTimeIn">Time In</button>  OR   -->
<input type="datetime-local" name="timeIn"  />  <br/>
<!-- <button id="currentTimeOut">Time Out</button>  OR   -->
<input type="datetime-local" name="timeOut"  /> <br/>



 <!-- --------------The Submit Part  -->
       
        <button type="submit">Create Invoice</button>
        <a href="./js/search.js">Search Ivnoices</a>
    </form>

</main>

<script src="js/main.js"></script>
</body>
</html>
